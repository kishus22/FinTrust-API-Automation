name: FinTrust API Automation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout automation repo
      - name: Checkout automation repo
        uses: actions/checkout@v3

      # 2️⃣ Checkout backend repo
      - name: Checkout backend repo
        uses: actions/checkout@v3
        with:
          repository: https://github.com/kishus22/FinTrust-Backend
          path: backend

      # 3️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 4️⃣ Install automation dependencies
      - name: Install automation dependencies
        run: |
          pip install -r requirements.txt

      # 5️⃣ Build backend Docker image
      - name: Build backend Docker image
        run: |
          cd backend
          docker build -t fintrust-backend .

      # 6️⃣ Run backend container
      - name: Run backend container
        run: |
          docker run -d -p 5000:5000 fintrust-backend
          sleep 5

      # 7️⃣ Run tests
      - name: Run tests
        env:
          BASE_URL: http://127.0.0.1:5000
        run: |
          pytest --html=report.html --self-contained-html